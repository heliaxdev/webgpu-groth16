name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test-and-bench:
    name: Tests & Benchmarks
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.93.0"

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --release

      - name: Run benchmarks
        run: cargo bench --release
